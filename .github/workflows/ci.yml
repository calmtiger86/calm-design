name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate example DESIGN.md files
        run: |
          echo "=== DESIGN.md 검증 (Python ${{ matrix.python-version }}) ==="
          python scripts/validate-design-md.py examples/01-saas-dashboard-ko/DESIGN.md
          python scripts/validate-design-md.py examples/02-landing-toss-style/DESIGN.md
          python scripts/validate-design-md.py examples/04-preview-catalog/DESIGN.md
          python scripts/validate-design-md.py examples/05-figma-export/DESIGN.md
          echo "✅ 모든 DESIGN.md 검증 통과"

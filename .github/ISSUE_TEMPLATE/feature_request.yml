name: 기능 요청
description: 새로운 기능이나 개선 아이디어가 있으신가요?
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        아이디어 감사합니다! calm-design을 더 좋게 만들어주세요.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하고 싶으신가요?
      description: 현재 불편한 점이나 해결하고 싶은 문제를 설명해주세요.
      placeholder: 현재는 토스 스타일만 있는데, 카카오 스타일도 있으면 좋겠어요.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 어떤 해결책을 생각하셨나요?
      description: 기능이 어떻게 동작하면 좋을지 설명해주세요.
      placeholder: "카카오 스타일로"라고 말하면 카카오 디자인 시스템을 참조해서 만들어주면 좋겠어요.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리
      options:
        - 새 레퍼런스 브랜드 추가
        - 새 출력 엔진
        - 안티-슬롭 패턴 추가
        - 한국어 지원 개선
        - 문서화 개선
        - 기타
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 다른 방법을 시도해보셨나요?
      description: 현재 우회하는 방법이 있다면 알려주세요.

  - type: checkboxes
    id: contribution
    attributes:
      label: 기여 의향
      options:
        - label: 이 기능을 직접 구현해서 PR을 올릴 의향이 있습니다.

name: 버그 리포트
description: 버그를 발견하셨나요? 알려주세요.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트 감사합니다! 아래 정보를 최대한 채워주시면 빠르게 해결할 수 있습니다.

  - type: textarea
    id: description
    attributes:
      label: 무엇이 문제인가요?
      description: 어떤 문제가 발생했는지 설명해주세요.
      placeholder: "랜딩페이지 만들어줘"라고 했는데 에러가 발생했습니다.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 결과
      description: 어떻게 동작해야 한다고 생각하셨나요?
      placeholder: DESIGN.md와 HTML 코드가 생성되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로 어떤 일이 발생했나요?
      placeholder: 에러 메시지가 표시되었습니다.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 사용 환경
      options:
        - Claude Code (CLI)
        - Claude Desktop (Cowork)
        - Cursor
        - 기타
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 운영체제
      placeholder: macOS 14.0, Windows 11, Ubuntu 22.04

  - type: textarea
    id: logs
    attributes:
      label: 에러 로그 (있다면)
      description: 에러 메시지나 로그가 있으면 붙여넣어주세요.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 최신 버전의 calm-design을 사용하고 있습니다.
        - label: 비슷한 이슈가 있는지 검색해봤습니다.
